name: Release

# Fires on any tag matching v*. Builds sdist + wheel, generates a
# SHA256SUMS file, and creates a GitHub Release with auto-generated notes.
# PyPI / Docker Hub / Homebrew publish lives in M5 — this workflow is
# scoped to GitHub Releases only.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required for `gh release create` and asset upload

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build sdist + wheel and create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs needs the full tag history to compute the version.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build --outdir dist/

      - name: Verify wheel installs and `dd --version` matches the tag
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install --upgrade pip
          /tmp/verify/bin/pip install dist/*.whl
          BUILT_VERSION=$(/tmp/verify/bin/dd --version | awk '{print $2}')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag-derived version: $TAG_VERSION"
          echo "wheel version:       $BUILT_VERSION"
          if [ "$BUILT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — built wheel reports $BUILT_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          shasum -a 256 *.whl *.tar.gz > SHA256SUMS
          echo "=== artifacts ==="
          ls -la
          echo
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
            echo "Detected prerelease tag: $GITHUB_REF_NAME"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            ${{ steps.prerelease.outputs.flag }} \
            dist/*.whl dist/*.tar.gz dist/SHA256SUMS
